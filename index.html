<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClientLabs</title>

    <!-- KEEP THESE EXACT -->
    <script type="module" crossorigin src="/assets/index-BBIAA8U6.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Dtz6WAmm.css">

    <!-- Calendly -->
    <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
    <script src="https://assets.calendly.com/assets/external/widget.js" async></script>

    <style>
      .floating-cta {
        position: fixed;
        bottom: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 9999;
      }

      .cta-btn {
        padding: 12px 16px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        border: none;
        text-align: center;
      }

      .cta-primary {
        background: #0A84FF;
        color: white;
      }

      .cta-secondary {
        background: #111;
        color: #0A84FF;
        border: 1px solid #0A84FF;
        text-decoration: none;
        display: inline-block;
      }
    </style>
  </head>

  <body>
    <!-- React App -->
    <div id="root"></div>

    <!-- Floating CTA -->
    <div class="floating-cta">

      <!-- Calendly -->
      <button 
        class="cta-btn cta-primary"
        onclick="Calendly.initPopupWidget({url: 'https://calendly.com/gvgautham007/20min'}); return false;"
      >
        Book a Call
      </button>

      <!-- WhatsApp -->
      <a 
        href="https://wa.link/yzcdc7" 
        target="_blank" 
        class="cta-btn cta-secondary"
      >
        Quick Chat
      </a>

    </div>

    <!-- UNIVERSAL BUTTON FIX -->
    <script>
      function attachCalendly() {
        const elements = document.querySelectorAll("button, a");

        elements.forEach((el) => {
          const text = (el.textContent || "").toLowerCase();

          if (text.includes("book") && text.includes("call")) {

            // Avoid attaching multiple times
            if (el.dataset.calendlyBound === "true") return;
            el.dataset.calendlyBound = "true";

            el.addEventListener("click", function (e) {
              e.preventDefault();
              e.stopPropagation();

              if (window.Calendly) {
                Calendly.initPopupWidget({
                  url: "https://calendly.com/gvgautham007/20min",
                });
              }
            });
          }
        });
      }

      // Initial run
      window.addEventListener("load", () => {
        attachCalendly();

        // Re-run for React updates
        setInterval(attachCalendly, 1200);
      });
    </script>

  </body>
</html>
